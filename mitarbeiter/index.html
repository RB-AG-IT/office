<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitarbeiter</title>
    <link rel="stylesheet" href="../styles.css">

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: var(--bg-secondary);
            padding: var(--spacing-lg);
            margin: 0;
        }
    </style>
</head>
<body>

<!-- Modal für neuen Mitarbeiter -->
<div class="modal" id="addEmployeeModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title">Neuer Mitarbeiter</h2>
            <button class="modal-close" onclick="closeModal()">
                <svg style="width: 20px; height: 20px; color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Name *</label>
                <input type="text" class="form-input" id="employeeName" placeholder="Max Mustermann">
            </div>
            <div class="form-group">
                <label class="form-label">E-Mail *</label>
                <input type="email" class="form-input" id="employeeEmail" placeholder="max@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Rolle *</label>
                <select class="form-input" id="employeeRole">
                    <option value="führungsebene">Führungsebene</option>
                    <option value="kader manager">Kader Manager</option>
                    <option value="junior botschafter">Junior Botschafter</option>
                    <option value="senior botschafter">Senior Botschafter</option>
                    <option value="spitzen botschafter">Spitzen Botschafter</option>
                    <option value="quality manager">Quality Manager</option>
                    <option value="recruiting manager">Recruiting Manager</option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
            <button type="button" class="btn btn-primary" onclick="addEmployee()">Mitarbeiter hinzufügen</button>
        </div>
    </div>
</div>

<!-- Page Header -->
<div style="margin-bottom: var(--spacing-xl);">
    <h1 style="font-size: var(--font-size-heading); margin-bottom: var(--spacing-sm); font-weight: 600; color: var(--text-primary);">Mitarbeiter</h1>
    <p class="text-secondary text-sm">Mitarbeiter und Teams verwalten</p>
</div>

<!-- Action Bar -->
<div style="margin-bottom: var(--spacing-lg);">
    <!-- Zeile 1: Suchfeld + Button -->
    <div style="display: flex; justify-content: space-between; align-items: center; gap: var(--spacing-md); margin-bottom: var(--spacing-md);">
        <div style="position: relative; flex: 1; max-width: 500px;">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Mitarbeiter suchen..." 
                class="form-input"
                style="padding-left: 40px;"
            >
            <svg style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: #9ca3af; pointer-events: none;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
        </div>
        
        <button 
            id="addEmployeeBtn"
            class="btn btn-primary"
        >
            <svg style="width: 18px; height: 18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Neuer Mitarbeiter
        </button>
    </div>
    
    <!-- Zeile 2: Filter -->
    <div style="display: flex; gap: var(--spacing-md); align-items: center;">
        <select id="roleFilter" class="form-input" style="min-width: 180px; flex-shrink: 0; width: auto;">
            <option value="">Alle Rollen</option>
            <option value="junior_marketing_manager">Junior Marketing Manager</option>
            <option value="senior_marketing_manager">Senior Marketing Manager</option>
            <option value="spitzenbotschafter">Spitzenbotschafter</option>
            <option value="kader_manager">Kader Manager</option>
            <option value="führungsebene">Führungsebene</option>
        </select>
        
        <select id="statusFilter" class="form-input" style="min-width: 140px; flex-shrink: 0; width: auto;">
            <option value="">Alle Status</option>
            <option value="aktiv">Aktiv</option>
            <option value="ausstehend">Ausstehend</option>
            <option value="inaktiv">Inaktiv</option>
        </select>
    </div>
</div>

<!-- Employee List -->
<div class="table-container">
    <!-- Table Header -->
    <div style="display: grid; grid-template-columns: 48px 1.2fr 160px 120px 2fr 60px; gap: var(--spacing-sm); padding: var(--spacing-md) var(--spacing-lg); background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); font-size: var(--font-size-xs); font-weight: 600; color: var(--text-secondary); text-transform: uppercase;">
        <div></div>
        <div>Name</div>
        <div>Rolle</div>
        <div>Status</div>
        <div>E-Mail</div>
        <div></div>
    </div>
    
    <!-- Table Body -->
    <div id="employeeList">
        <!-- Mitarbeiter werden dynamisch aus Supabase geladen -->
        <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
            Lade Mitarbeiter...
        </div>
    </div>
</div>

<!-- Empty State -->
<div id="emptyState" style="display: none; text-align: center; padding: 64px var(--spacing-lg);">
    <svg style="width: 64px; height: 64px; margin: 0 auto var(--spacing-md); color: #d1d5db;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
    </svg>
    <h3 style="font-size: var(--font-size-lg); font-weight: 600; margin-bottom: var(--spacing-sm);">Keine Mitarbeiter gefunden</h3>
    <p class="text-secondary text-sm">Versuchen Sie einen anderen Suchbegriff oder Filter.</p>
</div>

<script>
// ================================================================
// SUPABASE SETUP
// ================================================================
const SUPABASE_URL = 'https://lgztglycqtiwcmiydxnm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnenRnbHljcXRpd2NtaXlkeG5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM4MDc2MTUsImV4cCI6MjA3OTM4MzYxNX0.a_ZeubRokmhdevV3JinTiD1Ji92C4bDHSiiDcYGZnt0';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ================================================================
// CONSTANTS
// ================================================================

const roleColors = {
    'führungsebene': 'background: #fee2e2; color: #dc2626;',
    'kader_manager': 'background: #f3e8ff; color: #9333ea;',
    'junior_marketing_manager': 'background: #dbeafe; color: #3b82f6;',
    'senior_marketing_manager': 'background: #bfdbfe; color: #2563eb;',
    'spitzenbotschafter': 'background: #e0e7ff; color: #4f46e5;',
    'quality_manager': 'background: #dcfce7; color: #16a34a;',
    'recruiting_manager': 'background: #fed7aa; color: #ea580c;',
    'teamleiter': 'background: #fef3c7; color: #d97706;'
};

const roleLabels = {
    'junior_marketing_manager': 'Junior Marketing Manager',
    'senior_marketing_manager': 'Senior Marketing Manager',
    'spitzenbotschafter': 'Spitzenbotschafter',
    'kader_manager': 'Kader Manager',
    'führungsebene': 'Führungsebene',
    'quality_manager': 'Quality Manager',
    'teamleiter': 'Teamleiter',
    'recruiting_manager': 'Recruiting Manager'
};

function openModal() {
    document.getElementById('addEmployeeModal').classList.add('show');
}

function closeModal() {
    document.getElementById('addEmployeeModal').classList.remove('show');
    document.getElementById('employeeName').value = '';
    document.getElementById('employeeEmail').value = '';
    document.getElementById('employeeRole').value = 'führungsebene';
}

document.getElementById('addEmployeeModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

function getRandomGradient() {
    const gradients = [
        'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
        'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
        'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
        'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
        'linear-gradient(135deg, #fa709a 0%, #fee140 100%)'
    ];
    return gradients[Math.floor(Math.random() * gradients.length)];
}

function getInitials(name) {
    const parts = name.trim().split(' ');
    if (parts.length >= 2) {
        return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    }
    return name.substring(0, 2).toUpperCase();
}

function addEmployee() {
    // Redirect to profile page for new employee
    window.location.href = 'profil.html';
    return;

    const name = document.getElementById('employeeName').value;
    const email = document.getElementById('employeeEmail').value;
    const role = document.getElementById('employeeRole').value;

    if (!name || !email) {
        alert('Bitte Name und E-Mail eingeben!');
        return;
    }
    
    const roleText = role.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    const roleColor = roleColors[role] || 'background: #f0f0f0; color: #666;';
    const initials = getInitials(name);
    const gradient = getRandomGradient();
    const today = new Date().toLocaleDateString('de-DE');
    
    const newRow = document.createElement('div');
    newRow.className = 'employee-row';
    newRow.style.cssText = 'display: grid; grid-template-columns: 48px 1.2fr 160px 120px 2fr 60px; gap: 8px; padding: 16px 24px; border-bottom: 1px solid #f0f0f0; align-items: center;';
    
    newRow.innerHTML = `
        <div style="width: 40px; height: 40px; border-radius: 50%; background: ${gradient}; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px;">${initials}</div>
        <div>
            <div style="font-weight: 500; font-size: 14px;">${name}</div>
            <div style="font-size: 12px; color: #9ca3af; margin-top: 2px;">Mitglied seit ${today}</div>
        </div>
        <div>
            <span style="padding: 3px 6px; ${roleColor} border-radius: 6px; font-size: 12px; font-weight: 500;">${roleText}</span>
        </div>
        <div>
            <span class="badge badge-warning">Ausstehend</span>
        </div>
        <div style="font-size: 14px; color: #6b7280;">${email}</div>
        <div style="display: flex; justify-content: flex-end;">
            <button style="width: 28px; height: 28px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; transition: background 0.2s;" onmouseover="this.style.background='#f0f1f3'" onmouseout="this.style.background='transparent'" title="Bearbeiten">
                <svg style="width: 16px; height: 16px; color: #9ca3af;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                </svg>
            </button>
        </div>
    `;
    
    document.getElementById('employeeList').insertBefore(newRow, document.getElementById('employeeList').firstChild);
    closeModal();
}

function filterEmployees() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const roleFilter = document.getElementById('roleFilter').value;
    const statusFilter = document.getElementById('statusFilter').value;

    const rows = document.querySelectorAll('.employee-row');
    let visibleCount = 0;

    rows.forEach(row => {
        const cols = row.querySelectorAll(':scope > div');

        if (cols.length < 6) return;

        const nameEl = cols[1].querySelector('div:first-child');
        const emailEl = cols[4];

        if (!nameEl || !emailEl) return;

        const name = nameEl.textContent.toLowerCase();
        const email = emailEl.textContent.toLowerCase();
        const mainRole = row.dataset.mainRole || '';
        const status = row.dataset.status || '';

        const matchesSearch = name.includes(searchTerm) || email.includes(searchTerm);
        const matchesRole = !roleFilter || mainRole === roleFilter;
        const matchesStatus = !statusFilter || status === statusFilter;

        if (matchesSearch && matchesRole && matchesStatus) {
            row.style.display = 'grid';
            visibleCount++;
        } else {
            row.style.display = 'none';
        }
    });

    document.getElementById('emptyState').style.display = visibleCount === 0 ? 'block' : 'none';
}

// ================================================================
// LOAD EMPLOYEES FROM SUPABASE
// ================================================================

async function loadEmployees() {
    try {
        const employeeListEl = document.getElementById('employeeList');
        employeeListEl.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">Lade Mitarbeiter...</div>';

        // Load all users with their profiles and roles
        const { data: users, error } = await supabase
            .from('user_with_roles')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) throw error;

        if (!users || users.length === 0) {
            employeeListEl.innerHTML = '';
            document.getElementById('emptyState').style.display = 'block';
            return;
        }

        // Render employees
        employeeListEl.innerHTML = '';
        document.getElementById('emptyState').style.display = 'none';

        for (const user of users) {
            // Load profile data
            const { data: profile } = await supabase
                .from('user_profiles')
                .select('*')
                .eq('user_id', user.id)
                .single();

            const fullName = profile ? `${profile.first_name || ''} ${profile.last_name || ''}`.trim() : user.name || user.email;
            const mainRole = user.main_role || 'junior_marketing_manager';
            const additionalRoles = user.additional_roles || [];
            const roleLabel = roleLabels[mainRole] || mainRole;
            const roleColor = roleColors[mainRole] || 'background: #f0f0f0; color: #666;';
            const initials = getInitials(fullName);
            const gradient = getRandomGradient();
            const memberSince = new Date(user.created_at).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });

            // Determine status (for now, all active)
            const status = 'aktiv';
            const statusBadge = status === 'aktiv' ? 'badge-success' : status === 'ausstehend' ? 'badge-warning' : 'badge-danger';
            const statusLabel = status === 'aktiv' ? 'Aktiv' : status === 'ausstehend' ? 'Ausstehend' : 'Inaktiv';

            const row = document.createElement('div');
            row.className = 'employee-row';
            row.style.cssText = 'display: grid; grid-template-columns: 48px 1.2fr 160px 120px 2fr 60px; gap: var(--spacing-sm); padding: var(--spacing-md) var(--spacing-lg); border-bottom: 1px solid #f0f0f0; align-items: center;';
            row.dataset.mainRole = mainRole;
            row.dataset.status = status;

            row.innerHTML = `
                <div style="width: 40px; height: 40px; border-radius: var(--radius-full); background: ${gradient}; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: var(--font-size-sm);">${initials}</div>
                <div>
                    <div style="font-weight: 500; font-size: var(--font-size-sm);">${fullName}</div>
                    <div class="text-xs text-secondary" style="margin-top: 2px;">Mitglied seit ${memberSince}</div>
                </div>
                <div>
                    <span style="padding: 3px 6px; ${roleColor} border-radius: var(--radius-sm); font-size: var(--font-size-xs); font-weight: 500;">${roleLabel}</span>
                    ${additionalRoles.length > 0 ? `<div style="margin-top: 4px; font-size: 10px; color: var(--text-secondary);">+${additionalRoles.length} Zusatz</div>` : ''}
                </div>
                <div>
                    <span class="badge ${statusBadge}">${statusLabel}</span>
                </div>
                <div class="text-sm text-secondary">${user.email}</div>
                <div style="display: flex; justify-content: flex-end;">
                    <button style="width: 28px; height: 28px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-sm); transition: background 0.2s;" onmouseover="this.style.background='#f0f1f3'" onmouseout="this.style.background='transparent'" title="Bearbeiten" onclick="window.location.href='profil.html?id=${user.id}'">
                        <svg style="width: 16px; height: 16px; color: #9ca3af;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                        </svg>
                    </button>
                </div>
            `;

            employeeListEl.appendChild(row);
        }

    } catch (error) {
        console.error('Load error:', error);
        document.getElementById('employeeList').innerHTML = `
            <div style="text-align: center; padding: 40px; color: #ef4444;">
                <svg style="width: 48px; height: 48px; margin: 0 auto 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <div style="font-weight: 600; margin-bottom: 8px;">Fehler beim Laden</div>
                <div style="font-size: 14px; color: var(--text-secondary);">${error.message}</div>
                <button onclick="loadEmployees()" style="margin-top: 16px; padding: 8px 16px; background: var(--accent-color); color: white; border: none; border-radius: 6px; cursor: pointer;">Erneut versuchen</button>
            </div>
        `;
    }
}

// ================================================================
// EVENT LISTENERS
// ================================================================

document.getElementById('searchInput').addEventListener('input', filterEmployees);
document.getElementById('roleFilter').addEventListener('change', filterEmployees);
document.getElementById('statusFilter').addEventListener('change', filterEmployees);
document.getElementById('addEmployeeBtn').addEventListener('click', openModal);

// Load employees on page load
document.addEventListener('DOMContentLoaded', loadEmployees);
</script>

</body>
</html>
