    <style>
        * {
            box-sizing: border-box;
        }

        body {
            overflow-y: auto;
            height: 100%;
            margin: 0;
            background: var(--bg-secondary);
        }

        /* Toolbar verstecken wenn in iframe (Shell hat eigene) */
        body.in-iframe .action-toolbar {
            display: none !important;
        }

        .page-container {
            padding: 0;
        }

        /* ========== SEITEN-SPEZIFISCHE SPALTENBREITEN ========== */
        /* Spalte 1 (Checkbox) wird durch zentrales .checkbox-cell gesteuert */

        .table th:nth-child(2),
        .table td:nth-child(2) { width: 240px; }

        .table th:nth-child(3),
        .table td:nth-child(3) { width: 200px; }

        .table th:nth-child(4),
        .table td:nth-child(4) { width: 180px; }

        .table th:nth-child(5),
        .table td:nth-child(5) { width: 140px; }

        .table th:nth-child(6),
        .table td:nth-child(6),
        .table th:nth-child(7),
        .table td:nth-child(7) {
            width: 50px;
            text-align: center;
            vertical-align: middle;
        }

        .table td:nth-child(6),
        .table td:nth-child(7) {
            padding: 0;
        }

        /* .table th:first-child border-right wird durch zentrales .checkbox-cell gesteuert */

        .child-row td:nth-child(2) {
            padding-left: 44px;
        }

        /* ========== EMAIL ========== */
        .user-email {
            font-size: 12px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ========== HERKUNFT ========== */
        .user-herkunft {
            font-size: 12px;
            color: var(--text-primary);
        }

        .user-herkunft .stadt {
            color: var(--text-secondary);
        }

        /* ========== STATUS ========== */
        .status-online {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            background: #dcfce7;
            color: #166534;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-online::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-offline {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* ========== COLUMN MODAL ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .column-modal {
            background: var(--bg-primary);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            width: 400px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .column-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .column-modal-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .column-modal-close {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }

        .column-modal-close:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .column-modal-close svg {
            width: 16px;
            height: 16px;
        }

        .column-modal-body {
            padding: 16px;
            overflow-y: auto;
            flex: 1;
        }

        .column-section-title {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .column-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .column-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: grab;
        }

        .column-item:hover {
            background: var(--bg-hover);
        }

        .column-drag {
            color: var(--text-tertiary);
            cursor: grab;
        }

        .column-drag svg {
            width: 14px;
            height: 14px;
        }

        .column-checkbox {
            width: 14px;
            height: 14px;
            accent-color: var(--accent-color);
        }

        .column-name {
            flex: 1;
            font-size: 12px;
            color: var(--text-primary);
        }

        .column-modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        .btn-modal {
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-modal-secondary {
            color: var(--text-primary);
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
        }

        .btn-modal-secondary:hover {
            background: var(--bg-hover);
        }

        .btn-modal-primary {
            color: #fff;
            background: var(--accent-color);
            border: 1px solid var(--accent-color);
        }

        .btn-modal-primary:hover {
            opacity: 0.9;
        }

        /* Template Section */
        .template-section {
            margin-bottom: 20px;
        }

        .template-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .template-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
        }

        .template-item:hover {
            background: var(--bg-hover);
        }

        .template-item.active {
            background: #e5e5e5;
            border-color: #a3a3a3;
        }

        .template-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .template-name {
            font-size: 12px;
            color: var(--text-primary);
        }

        .template-default {
            font-size: 9px;
            color: var(--text-secondary);
            background: var(--bg-hover);
            padding: 2px 6px;
            border-radius: 3px;
        }

        .btn-save-template {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-primary);
            border: 1px dashed var(--border-color);
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-save-template:hover {
            background: var(--bg-secondary);
            border-color: var(--text-tertiary);
        }

        .btn-save-template svg {
            width: 12px;
            height: 12px;
        }
    </style>
</head>

        // ================================================================

        // getInitials() und Stufen-Handling kommt aus badge-system.js

        function formatLastLogin(date, isOnline) {
            if (isOnline) {
                return `<span class="status-online">Online</span>`;
            }
            const d = new Date(date);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            return `<span class="status-offline">${day}.${month}.${year} ${hours}:${minutes}</span>`;
        }

            // Filter
            let filtered = users.filter(user => {
                if (currentFilter !== 'alle' && user.type !== currentFilter) return false;
                if (searchTerm) {
                    const term = searchTerm.toLowerCase();
                    if (!user.name.toLowerCase().includes(term) &&
                        !user.email.toLowerCase().includes(term)) return false;
                }
                // Stufen filter (only for Werber)
                if (!selectedStufen.includes('all') && user.type === 'werber') {
                    if (!selectedStufen.includes(user.stufe)) return false;
                }
                return true;
            });

            // Sort
            filtered.sort((a, b) => {
                let valA, valB;
                switch (currentSort.field) {
                    case 'name':
                        valA = a.name.toLowerCase();
                        valB = b.name.toLowerCase();
                        break;
                    case 'email':
                        valA = a.email.toLowerCase();
                        valB = b.email.toLowerCase();
                        break;
                    case 'herkunft':
                        valA = a.bundesland.toLowerCase();
                        valB = b.bundesland.toLowerCase();
                        break;
                    case 'lastLogin':
                        valA = new Date(a.lastLogin).getTime();
                        valB = new Date(b.lastLogin).getTime();
                        break;
                    default:
                        valA = a.name.toLowerCase();
                        valB = b.name.toLowerCase();
                }

                if (valA < valB) return currentSort.direction === 'asc' ? -1 : 1;
                if (valA > valB) return currentSort.direction === 'asc' ? 1 : -1;
                return 0;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = '';
                totalsBody.innerHTML = '';
                tableWrap.style.display = 'none';
                emptyState.style.display = 'flex';
                return;
            }

            tableWrap.style.display = 'block';
            emptyState.style.display = 'none';

            // Count totals
            const werberCount = filtered.filter(u => u.type === 'werber').length;
            const kundenCount = filtered.filter(u => u.type === 'kunde').length;

            // Render totals row
            totalsBody.innerHTML = `
                <tr class="totals-row">
                    <td class="checkbox-cell"></td>
                    <td><strong>Gesamt</strong> <span class="totals-count">${werberCount} Werber, ${kundenCount} Kunden</span></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
            `;

            // Render user rows
            let html = '';
            filtered.forEach(user => {
                const hasChildren = user.type === 'kunde' && user.einsatzgebiete && user.einsatzgebiete.length > 0;
                const rowClass = hasChildren ? 'expandable-row' : '';
                const expandAttr = hasChildren ? `data-expand-id="${user.id}"` : '';

                // Badge aus zentralem System (normale Größe)
                const badge = createBadge({
                    type: user.type,
                    name: user.name,
                    size: '',
                    stufe: user.type === 'werber' ? user.stufe : '',
                    isTC: user.isTC || false,
                    isQ: user.isQ || false
                });

                html += `
                <tr class="${rowClass}" ${expandAttr} data-id="${user.id}" data-type="${user.type}"
                    data-name="${user.name}" data-email="${user.email}"
                    data-herkunft="${user.bundesland}" data-lastLogin="${new Date(user.lastLogin).getTime()}">
                    <td class="checkbox-cell"><input type="checkbox" class="row-checkbox" onclick="event.stopPropagation(); updateDeleteButton();"></td>
                    <td>
                        <div class="name-cell">
                            ${hasChildren ? `
                            <svg class="expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>` : '<div class="no-expand-spacer"></div>'}
                            ${badge}
                        </div>
                    </td>
                    <td><span class="user-email">${user.email}</span></td>
                    <td><span class="user-herkunft">${user.bundesland} <span class="stadt">(${user.stadt})</span></span></td>
                    <td>${formatLastLogin(user.lastLogin, user.isOnline)}</td>
                    <td class="center">
                        <button class="btn-stats" onclick="event.stopPropagation(); openStatistics('${user.id}', '${user.type}')" title="Statistik anzeigen">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 20V10"></path>
                                <path d="M12 20V4"></path>
                                <path d="M6 20v-6"></path>
                            </svg>
                        </button>
                    </td>
                    <td class="center">
                        <div class="dropdown">
                            <button class="dropdown-btn" onclick="toggleDropdown(this); event.stopPropagation();">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="1"></circle>
                                    <circle cx="12" cy="5" r="1"></circle>
                                    <circle cx="12" cy="19" r="1"></circle>
                                </svg>
                            </button>
                            <div class="dropdown-menu">
                                <div class="dropdown-item" onclick="editUser('${user.id}', '${user.type}')">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                    Bearbeiten
                                </div>
                                <div class="dropdown-item" onclick="openStatistics('${user.id}', '${user.type}')">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"></path><path d="M12 20V4"></path><path d="M6 20v-6"></path></svg>
                                    Statistik
                                </div>
                                <div class="dropdown-divider"></div>
                                <div class="dropdown-item danger" onclick="deleteUser('${user.id}')">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                    Löschen
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>`;

                // Render child rows for Kunden with Einsatzgebiete
                if (hasChildren) {
                    user.einsatzgebiete.forEach(gebiet => {
                        const gebietBadge = createBadge({
                            type: 'werbegebiet',
                            name: gebiet.name,
                            size: 'small'
                        });

                        html += `
                        <tr class="child-row" data-parent-id="${user.id}">
                            <td class="checkbox-cell"><input type="checkbox" class="row-checkbox" onclick="updateDeleteButton();"></td>
                            <td>
                                <div class="name-cell">
                                    <div class="child-indent">└</div>
                                    ${gebietBadge}
                                </div>
                            </td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td class="center">
                                <button class="btn-stats" onclick="openGebietStatistics('${gebiet.id}')" title="Statistik">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M18 20V10"></path>
                                        <path d="M12 20V4"></path>
                                        <path d="M6 20v-6"></path>
                                    </svg>
                                </button>
                            </td>
                            <td class="center">
                                <div class="dropdown">
                                    <button class="dropdown-btn" onclick="toggleDropdown(this);">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <circle cx="12" cy="12" r="1"></circle>
                                            <circle cx="12" cy="5" r="1"></circle>
                                            <circle cx="12" cy="19" r="1"></circle>
                                        </svg>
                                    </button>
                                    <div class="dropdown-menu">
                                        <div class="dropdown-item" onclick="editGebiet('${gebiet.id}')">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                            Bearbeiten
                                        </div>
                                        <div class="dropdown-item" onclick="openGebietStatistics('${gebiet.id}')">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"></path><path d="M12 20V4"></path><path d="M6 20v-6"></path></svg>
                                            Statistik
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>`;
                    });
                }
            });

            tbody.innerHTML = html;

            // Re-attach expandable row listeners
            attachExpandableListeners();
        }

        function attachExpandableListeners() {
            document.querySelectorAll('.expandable-row').forEach(row => {
                row.addEventListener('click', function(e) {
                    if (e.target.closest('.dropdown') || e.target.closest('.btn-stats') || e.target.closest('.row-checkbox')) return;

                    const expandId = this.dataset.expandId;
                    const isOpen = this.classList.contains('open');

                    this.classList.toggle('open');

                    document.querySelectorAll(`.child-row[data-parent-id="${expandId}"]`).forEach(child => {
                        child.classList.toggle('visible', !isOpen);
                    });
                });
            });
        }

        // ================================================================
        // EVENT HANDLERS
        // ================================================================

        // View Filter (gesteuert durch Shell-Toolbar)
        function selectView(value, label) {
            currentFilter = value;
            renderUsers();
        }

        // Sorting
        document.querySelectorAll('th.sortable').forEach(th => {
            th.addEventListener('click', function() {
                const sortKey = this.dataset.sort;

                if (currentSort.field !== sortKey) {
                    currentSort.field = sortKey;
                    currentSort.direction = 'asc';
                } else if (currentSort.direction === 'asc') {
                    currentSort.direction = 'desc';
                } else {
                    currentSort.direction = 'asc';
                }

                document.querySelectorAll('th.sortable').forEach(h => {
                    h.classList.remove('sort-asc', 'sort-desc');
                });

                this.classList.add('sort-' + currentSort.direction);
                renderUsers();
            });
        });

        // Search wird durch Shell-Toolbar gesteuert (via postMessage)

        // Toggle All Expand
        function toggleAllExpand() {
            const btn = document.getElementById('toggleAllBtn');
            const expandableRows = document.querySelectorAll('.expandable-row');
            const childRows = document.querySelectorAll('.child-row');

            allExpanded = !allExpanded;

            expandableRows.forEach(row => {
                if (allExpanded) {
                    row.classList.add('open');
                } else {
                    row.classList.remove('open');
                }
            });

            childRows.forEach(child => {
                if (allExpanded) {
                    child.classList.add('visible');
                } else {
                    child.classList.remove('visible');
                }
            });

            const icon = btn.querySelector('svg');
            const text = btn.querySelector('span');

            if (allExpanded) {
                icon.style.transform = 'rotate(180deg)';
                text.textContent = 'Alle zuklappen';
            } else {
                icon.style.transform = 'rotate(0deg)';
                text.textContent = 'Alle aufklappen';
            }
        }

        // Select All
        function toggleSelectAll(checkbox) {
            const checkboxes = document.querySelectorAll('#tableBody .row-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = checkbox.checked;
            });
            updateDeleteButton();
        }

        // Delete Selected
        function updateDeleteButton() {
            const checkboxes = document.querySelectorAll('#tableBody .row-checkbox:checked');
            const deleteBtn = document.getElementById('deleteSelectedBtn');
            const countSpan = document.getElementById('selectedCount');

            if (checkboxes.length > 0) {
                deleteBtn.classList.add('visible');
                countSpan.textContent = checkboxes.length;
            } else {
                deleteBtn.classList.remove('visible');
            }
        }

        async function deleteSelected() {
            const checkboxes = document.querySelectorAll('#tableBody .row-checkbox:checked');
            const count = checkboxes.length;

            if (count === 0) return;

            const confirmed = await showConfirm(
                'Benutzer löschen',
                `Möchten Sie ${count} ${count === 1 ? 'Benutzer' : 'Benutzer'} wirklich löschen?`,
                'warning'
            );

            if (confirmed) {
                // Get IDs of selected users
                const idsToDelete = [];
                checkboxes.forEach(cb => {
                    const row = cb.closest('tr');
                    if (row && row.dataset.id) {
                        idsToDelete.push(row.dataset.id);
                    }
                });

                // Remove from users array
                users = users.filter(u => !idsToDelete.includes(u.id));

                // Re-render
                document.getElementById('selectAll').checked = false;
                renderUsers();
                updateDeleteButton();

                await showAlert('Erfolg', `${count} Benutzer gelöscht.`, 'success');
            }
        }

        // Dropdown Toggle
        function toggleDropdown(btn) {
            const menu = btn.nextElementSibling;
            const wasOpen = menu.classList.contains('open');

            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));

            if (!wasOpen) {
                menu.classList.add('open');
            }
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.dropdown')) {
                document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
            }
        });

        // ================================================================
        // NAVIGATION FUNCTIONS
        // ================================================================

        function openStatistics(userId, userType) {
            // Link to statistics dashboard with user ID
            if (window.parent && window.parent !== window) {
                window.parent.location.href = window.parent.location.pathname + '#statistics';
                // Also send message to load specific user
                setTimeout(() => {
                    const iframe = window.parent.document.querySelector('#content-container iframe');
                    if (iframe) {
                        iframe.src = `../statistik/dashboard.html?id=${userId}&type=${userType}`;
                    }
                }, 100);
            } else {
                window.location.href = `../statistik/dashboard.html?id=${userId}&type=${userType}`;
            }
        }

        function openGebietStatistics(gebietId) {
            if (window.parent && window.parent !== window) {
                window.parent.location.href = window.parent.location.pathname + '#statistics';
                setTimeout(() => {
                    const iframe = window.parent.document.querySelector('#content-container iframe');
                    if (iframe) {
                        iframe.src = `../statistik/dashboard.html?gebiet=${gebietId}`;
                    }
                }, 100);
            } else {
                window.location.href = `../statistik/dashboard.html?gebiet=${gebietId}`;
            }
        }

        function editUser(userId, userType) {
            if (userType === 'werber') {
                window.location.href = '../mitarbeiter/profil.html?id=' + userId;
            } else {
                window.location.href = '../kunden/kunde.html?id=' + userId;
            }
        }

        function editGebiet(gebietId) {
            console.log('Edit Einsatzgebiet:', gebietId);
        }

        async function deleteUser(userId) {
            const confirmed = await showConfirm('Benutzer löschen', 'Möchten Sie diesen Benutzer wirklich löschen?', 'warning');
            if (confirmed) {
                users = users.filter(u => u.id !== userId);
                renderUsers();
                await showAlert('Erfolg', 'Benutzer wurde gelöscht.', 'success');
            }
        }

        // ================================================================
        // COLUMN MODAL
        // ================================================================

        function openColumnModal() {
            document.getElementById('columnModal').classList.add('open');
        }

        function closeColumnModal() {
            document.getElementById('columnModal').classList.remove('open');
        }

        function applyColumns() {
            closeColumnModal();
        }

        async function saveColumnTemplate() {
            const name = await showPrompt('Vorlage speichern', 'Name der Vorlage:');
            if (name) {
                await showAlert('Erfolg', `Vorlage "${name}" gespeichert!`, 'success');
            }
        }

        document.getElementById('columnModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeColumnModal();
            }
        });

        // ================================================================
        // ADD USER MODAL
        // ================================================================

        const modal = document.getElementById('addUserModal');
        const userTypeSelect = document.getElementById('userType');
        const dynamicFields = document.getElementById('dynamicFields');
        const saveBtn = document.getElementById('saveUserBtn');

        // addUserBtn wird durch Shell-Toolbar gesteuert (via toolbarAction message)

        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('cancelBtn').addEventListener('click', closeModal);

        modal.addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        function closeModal() {
            modal.classList.remove('show');
            userTypeSelect.value = '';
            dynamicFields.innerHTML = '';
            saveBtn.disabled = true;
        }

        userTypeSelect.addEventListener('change', function() {
            const type = this.value;
            saveBtn.disabled = !type;

            if (type === 'werber') {
                dynamicFields.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">Name *</label>
                        <input type="text" class="form-input" id="userName" placeholder="Max Mustermann">
                    </div>
                    <div class="form-group">
                        <label class="form-label">E-Mail *</label>
                        <input type="email" class="form-input" id="userEmail" placeholder="max@example.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Karriere-Stufe *</label>
                        <select class="form-input" id="userRole">
                            <option value="">Bitte auswählen</option>
                            <option value="SMA">SMA - Starting Marketing Advisor</option>
                            <option value="EMA">EMA - Executive Marketing Advisor</option>
                            <option value="JMM">JMM - Junior Marketing Manager</option>
                            <option value="EMM">EMM - Executive Marketing Manager</option>
                            <option value="CEMM">CEMM - Chief Executive Marketing Manager</option>
                            <option value="SPB">SPB - Spitzenbotschafter</option>
                            <option value="KAD">KAD - Kadermanager</option>
                            <option value="FUE">FUE - Führungsebene</option>
                        </select>
                    </div>
                `;
            } else if (type === 'kunde') {
                dynamicFields.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">Kundenname *</label>
                        <input type="text" class="form-input" id="userName" placeholder="z.B. DRK Kreisverband München">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Typ *</label>
                        <select class="form-input" id="userRole">
                            <option value="kreisverband">Kreisverband</option>
                            <option value="ortsverein">Ortsverein</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Kontaktperson</label>
                        <input type="text" class="form-input" id="contactPerson" placeholder="Max Mustermann">
                    </div>
                    <div class="form-group">
                        <label class="form-label">E-Mail</label>
                        <input type="email" class="form-input" id="userEmail" placeholder="kontakt@drk-example.de">
                    </div>
                `;
            } else {
                dynamicFields.innerHTML = '';
            }
        });

        saveBtn.addEventListener('click', async function() {
            const type = userTypeSelect.value;
            const name = document.getElementById('userName')?.value?.trim();
            const email = document.getElementById('userEmail')?.value?.trim();
            const role = document.getElementById('userRole')?.value;

            if (!name || !role) {
                await showAlert('Pflichtfelder', 'Bitte alle Pflichtfelder ausfüllen.', 'warning');
                return;
            }

            const newUser = {
                id: String(Date.now()),
                type: type,
                name: name,
                stufe: role,
                email: email || 'keine@email.de',
                bundesland: 'Deutschland',
                stadt: 'Unbekannt',
                lastLogin: new Date(),
                isOnline: false,
                einsatzgebiete: type === 'kunde' ? [] : []
            };

            users.unshift(newUser);
            renderUsers();
            closeModal();

            await showAlert('Erfolg', 'Benutzer erfolgreich angelegt!', 'success');
        });

        // ================================================================
        // INITIALIZATION
        // ================================================================

        document.addEventListener('DOMContentLoaded', function() {
            if (window.self !== window.top) {
                document.body.classList.add('in-iframe');
            }

            users = [...dummyUsers];
            renderUsers();

            // Listen for filter messages from parent shell
            window.addEventListener('message', function(e) {
                if (e.data && e.data.type === 'navFilter') {
                    selectView(e.data.value, e.data.value === 'alle' ? 'Alle Benutzer' : (e.data.value === 'werber' ? 'Werber' : 'Kunden'));
                }
                if (e.data && e.data.type === 'searchQuery') {
                    searchTerm = e.data.query;
                    renderUsers();

                    // Send search results back
                    const results = users.filter(u => {
                        const term = e.data.query.toLowerCase();
                        return u.name.toLowerCase().includes(term) || u.email.toLowerCase().includes(term);
                    }).slice(0, 5).map(u => ({ id: u.id, name: u.name }));

                    window.parent.postMessage({
                        type: 'searchResults',
                        query: e.data.query,
                        headerText: 'Benutzer',
                        results: results
                    }, '*');
                }
                if (e.data && e.data.type === 'searchSelect') {
                    // Scroll to and highlight selected user
                    const row = document.querySelector(`tr[data-id="${e.data.id}"]`);
                    if (row) {
                        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        row.style.background = '#fef9c3';
                        setTimeout(() => {
                            row.style.background = '';
                        }, 2000);
                    }
                }
                if (e.data && e.data.type === 'toolbarAction') {
                    if (e.data.action === 'default') {
                        // Modal direkt öffnen (kein addUserBtn mehr)
                        document.getElementById('addUserModal').classList.add('show');
                    }
                }
                if (e.data && e.data.type === 'stufenFilter') {
                    selectedStufen = e.data.stufen;
                    renderUsers();
                }
            });
        });
    </script>
</body>
</html>
