<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kunden - RB Inside Office</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        /* Page-specific styles for Kunden */
        body {
            overflow-y: auto;
            height: 100%;
            margin: 0;
        }

        .page-container {
            padding: var(--spacing-lg);
        }

        .page-header {
            margin-bottom: var(--spacing-lg);
        }

        .page-title {
            font-size: var(--font-size-heading);
            font-weight: 600;
            color: var(--text-primary);
        }

        .actions-bar {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            align-items: center;
        }

        .search-wrapper {
            flex: 1;
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: var(--spacing-lg);
        }

        .filter-select {
            min-width: 180px;
        }

        /* Grid Layout */
        .customers-grid {
            display: grid;
            gap: 1px;
            background-color: var(--border-color);
        }

        .grid-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1.5fr 2fr 100px 50px;
            background-color: var(--bg-secondary);
            font-weight: 600;
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }

        .grid-header > div,
        .customer-row > div {
            padding: var(--spacing-md);
            background-color: var(--bg-primary);
            min-width: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .customer-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1.5fr 2fr 100px 50px;
            transition: background-color 0.15s ease;
        }

        .customer-row:hover > div {
            background-color: var(--bg-hover);
        }

        /* Customer Info */
        .customer-info {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .customer-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: var(--font-size-sm);
            color: white;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .customer-details h3 {
            margin: 0;
            font-size: var(--font-size-base);
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .customer-details p {
            margin: 2px 0 0 0;
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
        }

        /* Type Badges */
        .type-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: var(--font-size-xs);
            font-weight: 500;
        }

        .type-kreisverband {
            background-color: var(--info-bg);
            color: var(--info-text);
        }

        .type-ortsverein {
            background-color: #fce7f3;
            color: #9f1239;
        }

        /* Areas Tags */
        .areas-tags {
            display: flex;
            flex-wrap: nowrap;
            gap: 6px;
            overflow: hidden;
            width: 100%;
            min-width: 0;
        }

        .area-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background-color: var(--bg-secondary);
            border-radius: var(--radius-sm);
            font-size: var(--font-size-xs);
            color: var(--text-primary);
            white-space: nowrap;
            flex-shrink: 0;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .area-count {
            background-color: var(--bg-hover);
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 600;
            flex-shrink: 0;
        }

        /* Contact Info */
        .contact-info {
            display: flex;
            flex-direction: column;
            font-size: var(--font-size-sm);
            line-height: 1.4;
        }

        .contact-info .contact-name {
            color: var(--text-primary);
            font-weight: 500;
        }

        .contact-info .contact-email {
            color: var(--text-secondary);
            font-size: var(--font-size-xs);
        }

        /* Status Badges */
        .status-badge {
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: var(--font-size-sm);
            font-weight: 500;
            text-align: center;
        }

        .status-aktiv {
            background-color: var(--success-bg);
            color: var(--success-text);
        }

        .status-inaktiv {
            background-color: var(--warning-bg);
            color: var(--warning-text);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: var(--spacing-sm);
            justify-content: center;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            border: none;
            background-color: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            background-color: var(--bg-secondary);
            color: var(--accent-color);
        }

        /* Empty State */
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            margin-bottom: var(--spacing-md);
        }

    </style>
</head>
<body>
    <div class="page-container">
        <!-- Header -->
        <div class="page-header">
            <h1 class="page-title">Kunden</h1>
        </div>

        <!-- Aktions-Leiste -->
        <div class="actions-bar">
            <div class="search-wrapper">
                <input type="text" class="form-input search-input" id="searchInput" 
                       placeholder="Kunde oder Werbegebiet suchen...">
            </div>
            <button class="btn btn-primary" id="addCustomerBtn">
                <svg style="width: 18px; height: 18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                Neuer Kunde
            </button>
        </div>

        <!-- Filter-Leiste -->
        <div class="filter-bar">
            <select class="form-input filter-select" id="typeFilter">
                <option value="">Alle Typen</option>
                <option value="kreisverband">Kreisverband</option>
                <option value="ortsverein">Ortsverein</option>
            </select>
            <select class="form-input filter-select" id="statusFilter">
                <option value="">Alle Status</option>
                <option value="aktiv">Aktiv</option>
                <option value="inaktiv">Inaktiv</option>
            </select>
        </div>

        <!-- Tabelle -->
        <div class="table-container">
            <div class="customers-grid" id="customersGrid">
                <!-- Header -->
                <div class="grid-header">
                    <div>Kunde</div>
                    <div>Typ</div>
                    <div>Werbegebiete</div>
                    <div>Kontakt</div>
                    <div>Status</div>
                    <div></div>
                </div>
                
                <!-- Dummy Daten werden hier eingefügt -->
            </div>
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState">
            <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                      d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
            </svg>
            <p>Keine Kunden gefunden</p>
        </div>
    </div>

    <!-- Modal: Neuer Kunde -->
    <div class="modal" id="addCustomerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Neuer Kunde</h2>
                <button class="modal-close" id="closeModalBtn">
                    <svg style="width: 20px; height: 20px; color: var(--text-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Kundenname*</label>
                    <input type="text" class="form-input" id="customerName" 
                           placeholder="z.B. DRK Kreisverband München">
                </div>
                <div class="form-group">
                    <label class="form-label">Typ*</label>
                    <select class="form-input" id="customerType">
                        <option value="kreisverband">Kreisverband</option>
                        <option value="ortsverein">Ortsverein</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Kontaktperson</label>
                    <input type="text" class="form-input" id="contactPerson" 
                           placeholder="Max Mustermann">
                </div>
                <div class="form-group">
                    <label class="form-label">E-Mail</label>
                    <input type="email" class="form-input" id="contactEmail" 
                           placeholder="kontakt@drk-muenchen.de">
                </div>
                <div class="form-group">
                    <label class="form-label">Telefon</label>
                    <input type="text" class="form-input" id="contactPhone" 
                           placeholder="+49 89 123456">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelBtn">Abbrechen</button>
                <button class="btn btn-primary" id="saveCustomerBtn">Kunde anlegen</button>
            </div>
        </div>
    </div>


    <script>
        // Dummy-Daten für Kunden
        let customers = [
            {
                id: 1,
                name: 'DRK Kreisverband Ludwigshafen',
                type: 'kreisverband',
                areas: ['Ludwigshafen-Mitte e.V.', 'Ludwigshafen-Süd e.V.', 'Oggersheim e.V.'],
                contact: 'Dr. Maria Schmidt',
                email: 'schmidt@drk-ludwigshafen.de',
                phone: '+49 621 57000',
                status: 'aktiv'
            },
            {
                id: 2,
                name: 'DRK Ortsverein Römerberg-Dudenhofen',
                type: 'ortsverein',
                areas: ['Römerberg-Dudenhofen e.V.'],
                contact: 'Thomas Müller',
                email: 'mueller@drk-roemerberg.de',
                phone: '+49 6232 81234',
                status: 'aktiv'
            },
            {
                id: 3,
                name: 'DRK Kreisverband Rhein-Pfalz',
                type: 'kreisverband',
                areas: ['Speyer e.V.', 'Schifferstadt e.V.', 'Waldsee e.V.', 'Neuhofen e.V.'],
                contact: 'Anna Weber',
                email: 'weber@drk-rhein-pfalz.de',
                phone: '+49 6232 60990',
                status: 'aktiv'
            },
            {
                id: 4,
                name: 'DRK Ortsverein Mutterstadt',
                type: 'ortsverein',
                areas: ['Mutterstadt e.V.'],
                contact: 'Klaus Fischer',
                email: 'fischer@drk-mutterstadt.de',
                phone: '+49 6234 92345',
                status: 'inaktiv'
            },
            {
                id: 5,
                name: 'DRK Kreisverband Mannheim',
                type: 'kreisverband',
                areas: ['Mannheim-Neckarstadt e.V.', 'Mannheim-Sandhofen e.V.', 'Mannheim-Käfertal e.V.', 'Mannheim-Waldhof e.V.', 'Mannheim-Feudenheim e.V.'],
                contact: 'Prof. Dr. Hans Meyer',
                email: 'meyer@drk-mannheim.de',
                phone: '+49 621 833700',
                status: 'aktiv'
            }
        ];


        // Funktion zum Rendern der Kunden
        function renderCustomers() {
            const grid = document.getElementById('customersGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;

            // Header beibehalten, nur Rows löschen
            const rows = grid.querySelectorAll('.customer-row');
            rows.forEach(row => row.remove());

            const filteredCustomers = customers.filter(customer => {
                const matchesSearch = customer.name.toLowerCase().includes(searchTerm) ||
                                     customer.areas.some(area => area.toLowerCase().includes(searchTerm)) ||
                                     customer.contact.toLowerCase().includes(searchTerm);
                const matchesType = !typeFilter || customer.type === typeFilter;
                const matchesStatus = !statusFilter || customer.status === statusFilter;
                return matchesSearch && matchesType && matchesStatus;
            });

            if (filteredCustomers.length === 0) {
                document.getElementById('emptyState').style.display = 'flex';
                return;
            } else {
                document.getElementById('emptyState').style.display = 'none';
            }

            filteredCustomers.forEach(customer => {
                const row = document.createElement('div');
                row.className = 'customer-row';
                row.innerHTML = `
                    <div class="customer-info">
                        <div class="customer-icon">
                            ${customer.name.split(' ').slice(-1)[0].substring(0, 2).toUpperCase()}
                        </div>
                        <div class="customer-details">
                            <h3>${formatCustomerName(customer.name)}</h3>
                            <p>Kundennummer: KD-${String(customer.id).padStart(4, '0')}</p>
                        </div>
                    </div>
                    <div>
                        <span class="type-badge type-${customer.type}">
                            ${customer.type === 'kreisverband' ? 'Kreisverband' : 'Ortsverein'}
                        </span>
                    </div>
                    <div>
                        <div class="areas-tags">
                            ${customer.areas.slice(0, 3).map(area => 
                                `<span class="area-tag">${area}</span>`
                            ).join('')}
                            ${customer.areas.length > 3 ? 
                                `<span class="area-count">+${customer.areas.length - 3}</span>` : ''}
                        </div>
                    </div>
                    <div class="contact-info">
                        <span class="contact-name">${customer.contact}</span>
                        <span class="contact-email">${customer.email}</span>
                    </div>
                    <div>
                        <span class="status-badge status-${customer.status}">
                            ${customer.status === 'aktiv' ? 'Aktiv' : 'Inaktiv'}
                        </span>
                    </div>
                    <div>
                        <div class="action-buttons">
                            <button class="btn-icon" onclick="window.location.href='kunde.html?id=${customer.id}'" title="Bearbeiten">
                                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(row);
            });
        }

        // Hilfsfunktion: Kundenname mit Abkürzung formatieren
        function formatCustomerName(name) {
            return name
                .replace('Kreisverband', 'KV')
                .replace('Ortsverein', 'OV');
        }

        // Event Listeners
        document.getElementById('searchInput').addEventListener('input', renderCustomers);
        document.getElementById('typeFilter').addEventListener('change', renderCustomers);
        document.getElementById('statusFilter').addEventListener('change', renderCustomers);

        // Modal für neuen Kunden
        document.getElementById('addCustomerBtn').addEventListener('click', () => {
            document.getElementById('addCustomerModal').style.display = 'flex';
        });

        document.getElementById('closeModalBtn').addEventListener('click', () => {
            document.getElementById('addCustomerModal').style.display = 'none';
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            document.getElementById('addCustomerModal').style.display = 'none';
        });

        // Kunde speichern
        document.getElementById('saveCustomerBtn').addEventListener('click', () => {
            const name = document.getElementById('customerName').value;
            const type = document.getElementById('customerType').value;
            const contact = document.getElementById('contactPerson').value || 'Kein Kontakt';
            const email = document.getElementById('contactEmail').value || 'keine@email.de';
            const phone = document.getElementById('contactPhone').value || 'Keine Nummer';

            if (name) {
                const newCustomer = {
                    id: customers.length + 1,
                    name: name,
                    type: type,
                    areas: type === 'ortsverein' ? [name.replace('DRK Ortsverein ', '') + ' e.V.'] : [],
                    contact: contact,
                    email: email,
                    phone: phone,
                    status: 'aktiv'
                };
                
                customers.unshift(newCustomer);
                renderCustomers();
                
                // Modal schließen und Form zurücksetzen
                document.getElementById('addCustomerModal').style.display = 'none';
                document.getElementById('customerName').value = '';
                document.getElementById('contactPerson').value = '';
                document.getElementById('contactEmail').value = '';
                document.getElementById('contactPhone').value = '';
            }
        });

        // Modal außerhalb schließen
        window.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.style.display = 'none';
            }
        });

        // Initial rendern
        renderCustomers();
    </script>
</body>
</html>
