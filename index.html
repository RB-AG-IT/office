<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backoffice - RB Inside</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            overflow: hidden;
        }

        /* Layout Grid */
        .app-container {
            display: grid;
            grid-template-columns: 80px 1fr;
            grid-template-rows: auto 1fr;
            height: 100vh;
            transition: grid-template-columns 0.3s ease;
        }

        .app-container.expanded {
            grid-template-columns: 260px 1fr;
        }

        /* Sidebar */
        .sidebar {
            grid-column: 1;
            grid-row: 1 / -1;
            background: var(--bg-primary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px 16px 0 16px;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .menu-btn {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-primary);
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .menu-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .menu-btn svg {
            width: 20px;
            height: 20px;
        }

        .logo-separator {
            width: 100%;
            height: 1px;
            background: var(--border-color);
            margin: 16px 0 24px 0;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-right: auto;
        }

        .nav-menu {
            flex: 1;
            list-style: none;
        }

        .nav-item {
            margin-bottom: 4px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            white-space: nowrap;
            justify-content: flex-start;
        }

        .nav-link span {
            display: none;
        }

        .app-container.expanded .nav-link span {
            display: inline;
        }

        .nav-icon {
            margin-right: 0;
            flex-shrink: 0;
        }

        .app-container.expanded .nav-icon {
            margin-right: 12px;
        }

        .nav-link:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            stroke-width: 2px;
        }

        /* Settings Section */
        .sidebar-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            margin-top: auto;
            margin-bottom: 0;
            list-style: none;
        }

        .sidebar-footer .nav-item {
            margin-bottom: 0;
        }

        /* Top Bar */
        .topbar {
            grid-column: 2;
            grid-row: 1;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 32px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 16px;
        }

        .account-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .account-menu:hover {
            background: var(--bg-hover);
        }

        .account-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .account-info {
            display: flex;
            flex-direction: column;
        }

        .account-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .account-role {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Main Content Area */
        .content-area {
            grid-column: 2;
            grid-row: 2;
            overflow-y: auto;
            padding: 32px;
        }

        .content-frame {
            background: var(--bg-primary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            min-height: calc(100vh - 120px);
            padding: 32px;
            overflow-x: hidden;
        }

        /* Placeholder for embedded content */
        #content-iframe {
            width: 100%;
            min-height: 600px;
            border: none;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .app-container {
                grid-template-columns: 60px 1fr;
            }

            .sidebar {
                padding: 24px 8px;
            }

            .logo {
                font-size: 16px;
                text-align: center;
                padding: 0;
            }

            .nav-link span {
                display: none;
            }

            .nav-icon {
                margin-right: 0;
            }

            .account-info {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="menu-btn" id="sidebarToggle">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </div>
            </div>
            <div class="logo-separator"></div>
            
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a class="nav-link active" data-page="dashboard">
                            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                            </svg>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-page="campaigns">
                            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                            </svg>
                            <span>Kampagnen</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-page="employees">
                            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                            </svg>
                            <span>Mitarbeiter</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-page="records">
                            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                            <span>Datensätze</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-page="customers">
                            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                            </svg>
                            <span>Kunden</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-page="invoices">
                            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 14l6-6m-5.5.5h.01m4.99 5h.01M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16l3.5-2 3.5 2 3.5-2 3.5 2zM10 8.5a.5.5 0 11-1 0 .5.5 0 011 0zm5 5a.5.5 0 11-1 0 .5.5 0 011 0z"/>
                            </svg>
                            <span>Rechnungen</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-page="payouts">
                            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
                            </svg>
                            <span>Abrechnungen</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <li class="nav-item">
                    <a class="nav-link" data-page="settings">
                        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        <span>Einstellungen</span>
                    </a>
                </li>
            </div>
        </aside>

        <!-- Top Bar -->
        <header class="topbar">
            <div class="page-title">Office & Verwaltung</div>
            <div class="account-menu">
                <div class="account-avatar">AD</div>
                <div class="account-info">
                    <div class="account-name">Admin User</div>
                    <div class="account-role">Administrator</div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="content-area">
            <div class="content-frame" id="content-container">
                <!-- Content will be loaded here dynamically -->
                <h1 style="font-size: 28px; margin-bottom: 8px; font-weight: 600;">Willkommen zurück</h1>
                <p style="color: var(--text-secondary); font-size: 14px;">Bereit für den Start?</p>
            </div>
        </main>
    </div>

    <script>
        // Sidebar Toggle
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.querySelector('.app-container').classList.toggle('expanded');
        });

        // Navigation Handler
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                
                // Remove active class from all links
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                
                // Add active class to clicked link
                this.classList.add('active');
                
                // Get page name
                const page = this.getAttribute('data-page');
                
                // Set URL hash
                window.location.hash = page;
                
                // Load content
                loadPage(page);
            });
        });

        function loadPage(page) {
            const container = document.getElementById('content-container');
            
            // Page URLs mapping
            const pages = {
                dashboard: 'dashboard.html',
                campaigns: 'campaigns.html',
                employees: 'mitarbeiter.html',
                records: 'records.html',
                customers: 'customers.html',
                invoices: 'invoices.html',
                payouts: 'payouts.html',
                settings: 'settings.html'
            };
            
            // Load page in iframe
            if (pages[page]) {
                container.innerHTML = `<iframe src="${pages[page]}" style="width: 100%; height: 100%; border: none; display: block;"></iframe>`;
            } else {
                container.innerHTML = '<h1 style="font-size: 28px; margin-bottom: 8px; font-weight: 600;">Seite nicht gefunden</h1><p style="color: var(--text-secondary); font-size: 14px;">Die angeforderte Seite konnte nicht geladen werden.</p>';
            }
        }

        // Load page based on URL hash on page load
        window.addEventListener('DOMContentLoaded', function() {
            const hash = window.location.hash.substring(1); // Remove #
            
            if (hash && document.querySelector(`[data-page="${hash}"]`)) {
                // Remove active from all
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                
                // Set active on hash page
                const navLink = document.querySelector(`[data-page="${hash}"]`);
                if (navLink) {
                    navLink.classList.add('active');
                    loadPage(hash);
                }
            }
        });

        // Handle browser back/forward buttons
        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.substring(1);
            
            if (hash && document.querySelector(`[data-page="${hash}"]`)) {
                // Remove active from all
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                
                // Set active on hash page
                const navLink = document.querySelector(`[data-page="${hash}"]`);
                if (navLink) {
                    navLink.classList.add('active');
                    loadPage(hash);
                }
            }
        });
    </script>
</body>
</html>
