<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datensätze - RB Inside Office</title>
    <!-- Zentrale Styles -->
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../css/table-system.css">
    <link rel="stylesheet" href="../css/datensaetze.css">
    <!-- Zentrale Scripts -->
    <script src="../js/modal-system.js"></script>
    <script src="../js/badge-system.js"></script>
    <script src="../js/table-common.js"></script>
    <script src="../js/datensaetze.js"></script>
    <style>
        /* Seiten-spezifische Styles (nur wenn nötig) */
        body {
            background: var(--bg-secondary);
        }
    </style>
</head>
<body class="datensaetze-page">
    <div class="page-container">
        <div class="content-area">
            <!-- TAB NAVIGATION -->
            <div class="tabs-container">
                <button class="back-btn" onclick="goBack()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <span id="contextBadge" class="context-badge"></span>
                <button class="tab-btn active" data-tab="records" onclick="switchTab('records')">
                    Neumitglieder / Erhöhungen
                    <span class="tab-badge" id="recordsBadge">32</span>
                </button>
                <button class="tab-btn" data-tab="bestand" onclick="switchTab('bestand')">
                    Bestandsmitglieder
                    <span class="tab-badge" id="bestandBadge">142</span>
                </button>
            </div>

            <!-- NEUMITGLIEDER / ERHÖHUNGEN TAB -->
            <div class="tab-content active" id="tab-records">
                <div class="table-wrap">
                    <div class="table-header">
                        <div class="table-header-left">
                            <span class="table-title">Datensätze</span>
                            <!-- Filter Buttons -->
                            <div class="filter-buttons">
                                <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Alle</button>
                                <button class="filter-btn" data-filter="nmg" onclick="setFilter('nmg')">Neumitglieder</button>
                                <button class="filter-btn" data-filter="erh" onclick="setFilter('erh')">Erhöhungen</button>
                                <button class="filter-btn" data-filter="storno" onclick="setFilter('storno')">Rückläufer (Stornos)</button>
                            </div>
                            <button class="btn-delete-selected" id="recordsSelectionBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                                </svg>
                                Ausgewählt<span class="selected-count" id="recordsSelectedCount">0</span>
                            </button>
                            <div class="header-actions" id="recordsHeaderActions">
                                <button class="header-action-btn btn-mail" onclick="sendMail('records')">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                    </svg>
                                    E-Mail
                                </button>
                                <button class="header-action-btn btn-pdf" onclick="downloadPDF('records')">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                    </svg>
                                    PDF
                                </button>
                                <button class="header-action-btn btn-storno" onclick="stornoSelected('records')">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/>
                                    </svg>
                                    Stornieren
                                </button>
                                <button class="header-action-btn btn-delete-action" onclick="deleteSelected('records')">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                    </svg>
                                    Löschen
                                </button>
                            </div>
                            <span class="header-divider"></span>
                            <button class="header-action-btn btn-columns" onclick="openColumnsModal('records')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
                                </svg>
                                Spalten
                            </button>
                        </div>
                        <div class="table-header-right">
                        </div>
                    </div>
                    <div class="table-container">
                        <table class="table" id="recordsTable">
                            <thead id="recordsTableHead">
                                <!-- Wird dynamisch gerendert -->
                            </thead>
                            <tbody id="recordsTableBody">
                                <!-- Wird dynamisch gerendert -->
                            </tbody>
                            <tfoot id="recordsTableFoot">
                                <!-- Wird dynamisch gerendert -->
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>

            <!-- BESTANDSMITGLIEDER TAB -->
            <div class="tab-content" id="tab-bestand">
                <div class="table-wrap">
                    <div class="table-header">
                        <div class="table-header-left">
                            <span class="table-title">Bestandsmitglieder</span>
                            <button class="btn-delete-selected" id="bestandSelectionBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                                </svg>
                                Ausgewählt<span class="selected-count" id="bestandSelectedCount">0</span>
                            </button>
                            <div class="header-actions" id="bestandHeaderActions">
                                <button class="header-action-btn btn-mail" onclick="sendMail('bestand')">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                    </svg>
                                    E-Mail
                                </button>
                                <button class="header-action-btn btn-pdf" onclick="downloadPDF('bestand')">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                    </svg>
                                    PDF
                                </button>
                                <button class="header-action-btn btn-storno" onclick="stornoSelected('bestand')">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/>
                                    </svg>
                                    Stornieren
                                </button>
                                <button class="header-action-btn btn-delete-action" onclick="deleteSelected('bestand')">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                    </svg>
                                    Löschen
                                </button>
                            </div>
                            <span class="header-divider"></span>
                            <button class="header-action-btn btn-columns" onclick="openColumnsModal('bestand')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
                                </svg>
                                Spalten
                            </button>
                        </div>
                        <div class="table-header-right">
                        </div>
                    </div>
                    <div class="table-container">
                        <table class="table" id="bestandTable">
                            <thead id="bestandTableHead">
                                <!-- Wird dynamisch gerendert -->
                            </thead>
                            <tbody id="bestandTableBody">
                                <!-- Wird dynamisch gerendert -->
                            </tbody>
                            <tfoot id="bestandTableFoot">
                                <!-- Wird dynamisch gerendert -->
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Storno Modal -->
    <div class="storno-modal-overlay" id="stornoModal">
        <div class="storno-modal">
            <div class="storno-modal-header">
                <h3 class="storno-modal-title">Datensatz stornieren</h3>
                <div class="storno-modal-subtitle" id="stornoModalSubtitle">Max Mustermann</div>
            </div>
            <div class="storno-modal-body">
                <div class="storno-form-group">
                    <label class="storno-form-label">Storno-Grund</label>
                    <select class="storno-form-select" id="stornoGrund" onchange="toggleStornoGrundFreitext()">
                        <option value="">Bitte auswählen...</option>
                        <option value="widerruf">Widerruf</option>
                        <option value="kuendigung">Kündigung</option>
                        <option value="nichtzahlung">Nichtzahlung</option>
                        <option value="doppelt">Doppelerfassung</option>
                        <option value="fehler">Eingabefehler</option>
                        <option value="sonstiges">Sonstiges</option>
                        <option value="freitext">Freie Eingabe</option>
                    </select>
                    <div class="freitext-fields" id="stornoGrundFreitextFields">
                        <input type="text" class="storno-form-input" id="stornoGrundFreitext" placeholder="Storno-Grund eingeben...">
                    </div>
                </div>
                <div class="storno-form-group">
                    <label class="storno-form-label">Storno-Datum</label>
                    <input type="date" class="storno-form-input" id="stornoDatum">
                </div>
                <div class="storno-form-group">
                    <label class="storno-form-checkbox">
                        <input type="checkbox" id="stornoBeschwerde" onchange="toggleBeschwerdeFields()">
                        <span>Beschwerde</span>
                    </label>
                </div>
                <div class="beschwerde-fields" id="beschwerdeFields">
                    <div class="storno-form-group">
                        <label class="storno-form-label">Beschwerdegrund</label>
                        <textarea class="storno-form-textarea" id="beschwerdeGrund" placeholder="Beschreiben Sie den Beschwerdegrund..."></textarea>
                    </div>
                </div>
                <div class="storno-form-group">
                    <label class="storno-form-checkbox">
                        <input type="checkbox" id="stornoMailBestaetigung">
                        <span>Storno per Mail bestätigen</span>
                    </label>
                </div>
            </div>
            <div class="storno-modal-footer">
                <button class="storno-btn storno-btn-cancel" onclick="closeStornoModal()">Abbrechen</button>
                <button class="storno-btn storno-btn-confirm" onclick="confirmStorno()">Stornieren</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="edit-modal-overlay" id="editModal">
        <div class="edit-modal">
            <div class="edit-modal-header">
                <div class="edit-modal-header-left">
                    <div class="edit-modal-avatar" id="editModalAvatar">MM</div>
                    <div class="edit-modal-title-group">
                        <h3 id="editModalName">Max Mustermann</h3>
                        <div class="edit-modal-subtitle">
                            <span class="badge nmg" id="editModalTypeBadge">NMG</span>
                            <span id="editModalDate">Erstellt am 10.12.2025</span>
                        </div>
                    </div>
                </div>
                <button class="edit-modal-close" onclick="closeEditModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="edit-modal-body">
                <!-- Linke Seite: Formular -->
                <div class="edit-form-section">
                    <div class="edit-form-group">
                        <div class="edit-form-group-title">Persönliche Daten</div>
                        <div class="edit-form-row">
                            <div class="edit-form-field">
                                <label class="edit-form-label">Anrede</label>
                                <select class="edit-form-input" id="editAnrede">
                                    <option value="Herr">Herr</option>
                                    <option value="Frau">Frau</option>
                                    <option value="Divers">Divers</option>
                                </select>
                            </div>
                            <div class="edit-form-field">
                                <label class="edit-form-label">Titel</label>
                                <input type="text" class="edit-form-input" id="editTitel" placeholder="z.B. Dr.">
                            </div>
                        </div>
                        <div class="edit-form-row">
                            <div class="edit-form-field">
                                <label class="edit-form-label">Vorname</label>
                                <input type="text" class="edit-form-input" id="editVorname">
                            </div>
                            <div class="edit-form-field">
                                <label class="edit-form-label">Nachname</label>
                                <input type="text" class="edit-form-input" id="editNachname">
                            </div>
                        </div>
                        <div class="edit-form-row">
                            <div class="edit-form-field">
                                <label class="edit-form-label">Geburtsdatum</label>
                                <input type="date" class="edit-form-input" id="editGeburtsdatum">
                            </div>
                            <div class="edit-form-field">
                                <label class="edit-form-label">E-Mail</label>
                                <input type="email" class="edit-form-input" id="editEmail">
                            </div>
                        </div>
                        <div class="edit-form-row">
                            <div class="edit-form-field">
                                <label class="edit-form-label">Telefon Mobil</label>
                                <input type="tel" class="edit-form-input" id="editTelefonMobil">
                            </div>
                            <div class="edit-form-field">
                                <label class="edit-form-label">Telefon Festnetz</label>
                                <input type="tel" class="edit-form-input" id="editTelefonFestnetz">
                            </div>
                        </div>
                    </div>

                    <div class="edit-form-group">
                        <div class="edit-form-group-title">Adresse</div>
                        <div class="edit-form-row">
                            <div class="edit-form-field" style="flex: 3;">
                                <label class="edit-form-label">Straße</label>
                                <input type="text" class="edit-form-input" id="editStrasse">
                            </div>
                            <div class="edit-form-field" style="flex: 1;">
                                <label class="edit-form-label">Hausnr.</label>
                                <input type="text" class="edit-form-input" id="editHausnummer">
                            </div>
                        </div>
                        <div class="edit-form-row three-cols">
                            <div class="edit-form-field">
                                <label class="edit-form-label">PLZ</label>
                                <input type="text" class="edit-form-input" id="editPLZ">
                            </div>
                            <div class="edit-form-field" style="grid-column: span 2;">
                                <label class="edit-form-label">Ort</label>
                                <input type="text" class="edit-form-input" id="editOrt">
                            </div>
                        </div>
                    </div>

                    <div class="edit-form-group">
                        <div class="edit-form-group-title">Beitrag & Zahlung</div>
                        <div class="edit-form-row three-cols">
                            <div class="edit-form-field">
                                <label class="edit-form-label">Beitrag (€)</label>
                                <input type="number" class="edit-form-input" id="editBeitrag" step="0.01">
                            </div>
                            <div class="edit-form-field">
                                <label class="edit-form-label">Intervall</label>
                                <select class="edit-form-input" id="editIntervall">
                                    <option value="monatlich">Monatlich</option>
                                    <option value="vierteljaehrlich">Vierteljährlich</option>
                                    <option value="halbjaehrlich">Halbjährlich</option>
                                    <option value="jaehrlich">Jährlich</option>
                                </select>
                            </div>
                            <div class="edit-form-field">
                                <label class="edit-form-label">Jahreseuros</label>
                                <input type="text" class="edit-form-input" id="editJE" disabled>
                            </div>
                        </div>
                        <div class="edit-form-row">
                            <div class="edit-form-field">
                                <label class="edit-form-label">IBAN</label>
                                <input type="text" class="edit-form-input" id="editIBAN">
                            </div>
                            <div class="edit-form-field">
                                <label class="edit-form-label">BIC</label>
                                <input type="text" class="edit-form-input" id="editBIC">
                            </div>
                        </div>
                        <div class="edit-form-row">
                            <div class="edit-form-field full-width">
                                <label class="edit-form-label">Kontoinhaber</label>
                                <input type="text" class="edit-form-input" id="editKontoinhaber">
                            </div>
                        </div>
                    </div>

                    <div class="edit-form-group">
                        <div class="edit-form-group-title">Zuordnung</div>
                        <div class="edit-form-row">
                            <div class="edit-form-field">
                                <label class="edit-form-label">Werbegebiet</label>
                                <input type="text" class="edit-form-input" id="editGebiet" disabled>
                            </div>
                            <div class="edit-form-field">
                                <label class="edit-form-label">Werber</label>
                                <input type="text" class="edit-form-input" id="editWerber" disabled>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Rechte Seite: Historie -->
                <div class="edit-history-section">
                    <div class="edit-history-title">Verlauf</div>
                    <div class="history-timeline" id="editHistoryTimeline">
                        <!-- Wird dynamisch gefüllt -->
                    </div>
                </div>
            </div>
            <div class="edit-modal-footer">
                <button class="edit-btn edit-btn-cancel" onclick="closeEditModal()">Abbrechen</button>
                <button class="edit-btn edit-btn-save" onclick="saveEditModal()">Speichern</button>
            </div>
        </div>
    </div>

    <!-- Columns Modal -->
    <div class="columns-modal-overlay" id="columnsModal">
        <div class="columns-modal">
            <div class="columns-modal-header">
                <h3 class="columns-modal-title" id="columnsModalTitle">Spalten konfigurieren</h3>
                <button class="columns-modal-close" onclick="closeColumnsModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="columns-modal-body">
                <!-- Linke Seite: Spalten-Liste -->
                <div class="columns-main">
                    <div class="columns-hint">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        Ziehen zum Sortieren, Checkbox zum Ein-/Ausblenden
                    </div>
                    <div class="columns-list" id="columnsList">
                        <!-- Wird dynamisch gefüllt -->
                    </div>
                </div>

                <!-- Rechte Seite: Vorlagen -->
                <div class="columns-templates">
                    <div class="templates-title">Vorlagen</div>
                    <div class="templates-list" id="templatesList">
                        <!-- Wird dynamisch gefüllt -->
                    </div>
                    <button class="template-add-btn" id="templateAddBtn" onclick="startAddTemplate()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14m-7-7h14"/>
                        </svg>
                        Als Vorlage speichern
                    </button>
                    <input type="text" class="template-name-input" id="templateNameInput"
                           placeholder="Vorlagenname..."
                           style="display: none;"
                           onkeydown="handleTemplateNameKeydown(event)">
                </div>
            </div>
            <div class="columns-modal-footer">
                <button class="columns-reset-btn" onclick="resetColumns()">Zurücksetzen</button>
                <button class="columns-save-btn" onclick="saveColumns()">Übernehmen</button>
            </div>
        </div>
    </div>
